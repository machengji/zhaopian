<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TonePort - Web 色调迁移工作台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app-shell">
      <section class="title-block">
        <p class="eyebrow">Lightweight Web Color Transfer</p>
        <h1>TonePort</h1>
        <p class="subtitle">
          专注 Web 端轻量级调色：一键上传即用、移动端也流畅，支持预设库、AI 推荐和高质量导出。
        </p>
      </section>

      <section class="workspace-grid">
        <aside class="control-panel glass">
          <div class="panel-group">
            <h2>1. 上传图片</h2>
            <label class="file-input">
              <span>参考图（提取色调）</span>
              <input id="sourceInput" type="file" accept="image/*" />
            </label>
            <label class="file-input">
              <span>目标图（应用色调）</span>
              <input id="targetInput" type="file" accept="image/*" />
            </label>

            <div class="thumb-grid">
              <figure>
                <figcaption>参考图</figcaption>
                <img id="sourceThumb" alt="参考图预览" />
              </figure>
              <figure>
                <figcaption>目标图</figcaption>
                <img id="targetThumb" alt="目标图预览" />
              </figure>
            </div>
          </div>

          <div class="panel-group">
            <h2>2. 算法和风格</h2>
            <label class="inline-control">
              <span>算法</span>
              <select id="algorithmSelect">
                <option value="reinhard">Reinhard（稳定快速）</option>
                <option value="enhanced">Enhanced（相关性增强）</option>
              </select>
            </label>

            <label class="inline-control">
              <span>预设库</span>
              <select id="presetSelect">
                <option value="none">无预设（仅迁移）</option>
                <option value="film">胶片柔和</option>
                <option value="cinematic">电影青橙</option>
                <option value="ecom">电商清透</option>
                <option value="social">社媒高对比</option>
              </select>
            </label>

            <div class="inline-with-button">
              <label class="inline-control">
                <span>性能档位</span>
                <select id="qualitySelect">
                  <option value="mobile">极速（手机优先）</option>
                  <option value="balanced">均衡（推荐）</option>
                  <option value="pro">高质量（较慢）</option>
                </select>
              </label>
              <button id="recommendBtn" class="btn btn-ghost" type="button">AI 推荐</button>
            </div>

            <label class="inline-control">
              <span>迁移强度</span>
              <input id="strengthRange" type="range" min="0" max="100" value="92" />
              <output id="strengthValue">92%</output>
            </label>

            <label class="inline-control">
              <span>色彩饱和</span>
              <input id="saturationRange" type="range" min="30" max="180" value="105" />
              <output id="saturationValue">1.05x</output>
            </label>

            <label class="inline-control">
              <span>亮度保真</span>
              <input id="lumaPreserveRange" type="range" min="0" max="100" value="40" />
              <output id="lumaPreserveValue">40%</output>
            </label>

            <label class="inline-control checkbox-control">
              <input id="invertToggle" type="checkbox" />
              <span>先反色再迁移</span>
            </label>

            <label class="inline-control checkbox-control">
              <input id="hqExportToggle" type="checkbox" checked />
              <span>后台生成高清下载（可能更慢）</span>
            </label>
          </div>

          <div class="action-row">
            <button id="processBtn" class="btn btn-primary">3. 开始迁移</button>
            <button id="downloadBtn" class="btn btn-secondary" disabled>下载结果</button>
          </div>

          <p id="statusText" class="status">等待上传图片</p>
          <pre id="statsText" class="stats"></pre>
        </aside>

        <section class="preview-panel glass">
          <div class="preview-head">
            <h2>4. 前后对比预览</h2>
            <p>拖动滑杆查看变化</p>
          </div>

          <div class="compare-box" id="compareBox">
            <canvas id="beforeCanvas" aria-label="迁移前"></canvas>
            <div class="after-layer" id="afterLayer">
              <canvas id="afterCanvas" aria-label="迁移后"></canvas>
            </div>
            <input
              id="compareSlider"
              class="compare-slider"
              type="range"
              min="0"
              max="100"
              value="50"
            />
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
